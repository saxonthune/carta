name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pip install pytest click pyyaml
      - name: Build carta.pyz
        run: |
          cd packages/cli
          python3 build_zipapp.py
          cp carta.pyz carta_cli/carta.pyz
      - run: pnpm build
      - run: pnpm test
